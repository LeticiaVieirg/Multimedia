<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Leticia Vieira</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark:   '#740835',
                            mid:    '#a33060',
                            light:  '#bf5380',
                            accent: '#be4a4a',
                            deep:   '#6b0c0c',
                        }
                    },
                    fontFamily: {
                        display: ['"Playfair Display"', 'serif'],
                        body:    ['"DM Sans"', 'sans-serif'],
                    },
                    boxShadow: {
                        card: '0 20px 60px rgba(116,8,53,0.25)',
                        btn:  '0 4px 15px rgba(107,12,12,0.4)',
                    },
                    animation: {
                        'fade-up': 'fadeUp 0.7s ease both',
                    },
                    keyframes: {
                        fadeUp: {
                            '0%':   { opacity: 0, transform: 'translateY(24px)' },
                            '100%': { opacity: 1, transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

    <style>
        .avatar-ring {
            background: conic-gradient(from 0deg, #740835, #bf5380, #740835);
            animation: spin 4s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.25s; }
        .delay-3 { animation-delay: 0.4s; }
        .delay-4 { animation-delay: 0.55s; }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center font-body
